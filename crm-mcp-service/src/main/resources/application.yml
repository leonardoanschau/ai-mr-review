server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: crm-mcp-service
  
  # Cache
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

# Configurações GitLab
gitlab:
  api-url: ${GITLAB_API_URL:http://gitlab.dimed.com.br/api/v4}
  token: ${GITLAB_TOKEN}
  default-group: ${GITLAB_DEFAULT_GROUP:grupopanvel/varejo/crm}
  default-assignee: ${GITLAB_DEFAULT_ASSIGNEE:lanschau}
  default-backlog-label: ${GITLAB_BACKLOG_LABEL:Grupo Panvel :: Backlog}
  timeout: 30

# Configurações OpenAI
openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o
  temperature: 0.7
  timeout: 90

# MCP Server
mcp:
  server:
    name: gitlab-issues-mcp
    version: 1.0.0
    
# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: INFO
    com.panvel.crm: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Resilience4j
resilience4j:
  retry:
    instances:
      openai:
        max-attempts: 3
        wait-duration: 30s
      gitlab:
        max-attempts: 3
        wait-duration: 5s
