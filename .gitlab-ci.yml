# GitLab CI/CD Pipeline para Varejo CRM MCP Extension

stages:
  - test
  - build
  - release

variables:
  VSIX_NAME: "varejo-crm-mcp-${CI_COMMIT_TAG}.vsix"

# ========================================
# Stage: Test
# ========================================

test:lint:
  stage: test
  image: node:20-alpine
  script:
    - npm install
    - npm run lint
  only:
    - merge_requests
    - main

test:compile:
  stage: test
  image: node:20-alpine
  script:
    - npm install
    - npm run compile
  artifacts:
    paths:
      - out/
    expire_in: 1 hour
  only:
    - merge_requests
    - main

# ========================================
# Stage: Build
# ========================================

build:vsix:
  stage: build
  image: node:20-alpine
  before_script:
    - apk add --no-cache python3 py3-pip
    - npm install -g @vscode/vsce
  script:
    - npm install
    - npm run compile
    - vsce package --out ${VSIX_NAME}
    - ls -lh *.vsix
  artifacts:
    paths:
      - "*.vsix"
    expire_in: 30 days
  only:
    - tags
    - main

# ========================================
# Stage: Release (só em tags)
# ========================================

release:gitlab:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Criando release ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Varejo CRM MCP v${CI_COMMIT_TAG}"
    description: |
      ## 🚀 Release v${CI_COMMIT_TAG}
      
      ### 📦 Instalação
      
      **Via Script:**
      ```bash
      curl -sL http://gitlab.dimed.com.br/grupopanvel/varejo/crm/varejo-crm-mcp/-/raw/main/scripts/install.sh | bash -s ${CI_COMMIT_TAG}
      ```
      
      **Manual:**
      ```bash
      # Baixe o .vsix abaixo
      code --install-extension ${VSIX_NAME}
      ```
      
      ### 📝 Changelog
      
      Veja [CHANGELOG.md](http://gitlab.dimed.com.br/grupopanvel/varejo/crm/varejo-crm-mcp/-/blob/${CI_COMMIT_TAG}/CHANGELOG.md)
      
      ### 🔗 Links
      
      - [Documentação](http://gitlab.dimed.com.br/grupopanvel/varejo/crm/varejo-crm-mcp/-/blob/${CI_COMMIT_TAG}/README.md)
      - [Issues](http://gitlab.dimed.com.br/grupopanvel/varejo/crm/varejo-crm-mcp/-/issues)
    assets:
      links:
        - name: "${VSIX_NAME}"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${VSIX_NAME}?job=build:vsix"
          link_type: package
  only:
    - tags

