version: '3.8'

services:
  crm-mcp-service:
    build: .
    container_name: crm-mcp-service
    ports:
      - "8080:8080"
    environment:
      # GitLab Configuration
      GITLAB_API_URL: ${GITLAB_API_URL:-http://gitlab.dimed.com.br/api/v4}
      GITLAB_TOKEN: ${GITLAB_TOKEN}
      GITLAB_DEFAULT_GROUP: ${GITLAB_DEFAULT_GROUP:-grupopanvel/varejo/crm}
      GITLAB_DEFAULT_ASSIGNEE: ${GITLAB_DEFAULT_ASSIGNEE}
      GITLAB_DEFAULT_BACKLOG_LABEL: "${GITLAB_DEFAULT_BACKLOG_LABEL:-Grupo Panvel :: Backlog}"
      
      # OpenAI Configuration
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      
      # JVM Options
      JAVA_OPTS: >
        -Xms256m
        -Xmx512m
        -XX:+UseG1GC
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge
